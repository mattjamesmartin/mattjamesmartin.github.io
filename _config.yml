# Site
title:              Matthew Martin
bio:                "Ph.D Student at University of Texas Department of Government"
locale:             en_US
baseurl: ""  
url: "" 

# Comments
disqus_shortname:   default

# Social
analytics-id:       "default"
twitter:            "MattJ_Martin"
linkedin:           "/in/matthew-martin-aa48a9109/"
university:         "/government/gradstudents/mjm7865"

# personal
location:           Austin, TX, USA
email:              mjmartin@utexas.edu

# Other
background_image:   /images/sanjuancoast.jpg

slapform_thankyou_page: /thank-you

defaults:
- scope:
    path: ''
    type: posts
  values:
    permalink: "/blog/:title/"
    layout: post
    author:

# Jekyll
permalink:          /blog/:title/
markdown:           kramdown
highlighter:        rouge
kramdown:
  auto_ids:         true
  footnote_nr:      1
  entity_output:    as_char
  toc_levels:       1..6
  enable_coderay:   false
mathjax:            true
sass:
  sass_dir:         _sass
  style:            compressed

# Gems
gems:
  - jekyll-mentions
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page:num/"

jekyll-mentions:
    base_url: https://github.com

# Exclude list
exclude: [README.md, Gemfile, Gemfile.lock, node_modules, gulpfile.js, package.json, _site, src, vendor, CNAME, LICENSE, Rakefile, old]
