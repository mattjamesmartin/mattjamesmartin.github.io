# Date format
date-format: "MMMM D, YYYY"

# Default for table of contents (design has none on detail pages)
toc: false

include-back-link: true

format:
  html:
    code-tools: false
    reading-time: true

freeze: true

# Default knitr options
execute:
  echo: true
  message: true
  warning: true

# Default author
author:
  - name: Matthew Martin
    url: https://mattjamesmartin.github.io/
    orcid: 0000-0003-3460-3603
