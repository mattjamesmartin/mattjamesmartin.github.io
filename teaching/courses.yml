- code: "POLI 391"
  title: "World Constitutions"
  institution: "University of South Carolina"
  semesters:
    - "Fall 2026"
  summary: "This course explores the theoretical foundations of modern constitutionalism, the stages of the design process, innovations governments have incorporated into constitution-making, differences between democratic and authoritarian constitutions, and why constitutions ultimately die. Readings include materials on constitutional systems from Africa, Asia, and Latin America."
