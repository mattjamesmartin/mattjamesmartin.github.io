- title: World Constitutions
  description: "Constitutions are fundamental to the establishment, and re-establishment, of a country's social, political, and economic order. Countries have experimented relentlessly with constitutional design, transforming our understanding of how constitutions are made, maintained, and replaced. This course explores the theoretical foundations of modern constitutionalism, the stages of the design process, innovations governments have incorporated into constitution-making, differences between democratic and authoritarian constitutions, and why constitutions ultimately die. Readings include materials on constitutional systems from various regions including Africa, Asia, and Latin America."
  university: University of South Carolina
  number: POLI 391
  semesters:
    - name: Fall 2026
