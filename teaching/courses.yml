- title: Judicial Process and Behavior
  description: "This course examines the operation of the U.S. civil and criminal justice system, judicial decision-making through both normative and empirical approaches, and relevant constitutional doctrines. Students develop the ability to understand, comprehend, and critique textual materials, think logically, analytically and creatively, draw useful information from empirical data about judicial behavior, and create cogent arguments about the issues covered."
  university: University of Texas at Austin
  number: GOV 357L
