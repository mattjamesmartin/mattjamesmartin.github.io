- code: "POLI 709"
  title: "Qualitative Methods of Political Analysis"
  institution: "University of South Carolina"
  semesters:
    - "Fall 2026"
  summary: "This course prepares graduate students to design, conduct, and evaluate qualitative research in political science. Pluralist in method but explicit about what makes such research rigorous, the course takes up questions of evidentiary quality, transparency, and judgment, including emerging debates over the role of artificial intelligence, as students work toward a research project they can develop beyond the semester."
  actions:
    - name: "Syllabus"
      url: "syllabi/POLI709-Syllabus-Qualitative-Research.pdf"
      icon: "fa-solid fa-file-pdf"
  date: 2026-08-16

- code: "POLI 391"
  title: "World Constitutions"
  institution: "University of South Carolina"
  semesters:
    - "Fall 2026"
  summary: "This course explores the theoretical foundations of modern constitutionalism, the stages of the design process, innovations governments have incorporated into constitution-making, differences between democratic and authoritarian constitutions, and why constitutions ultimately die. Readings include materials on constitutional systems from Africa, Asia, and Latin America."
  actions:
    - name: "Syllabus"
      url: "syllabi/POLI391-World-Constitutions-Syllabus-fa26.pdf"
      icon: "fa-solid fa-file-pdf"
  date: 2026-08-16

- code: "GOV 357L"
  title: "Judicial Process and Behavior"
  institution: "University of Texas at Austin"
  semesters:
    - "Spring 2024"
  summary: "An examination of the operation of the U.S. civil and criminal justice system, judicial decision-making through both normative and empirical approaches, and relevant constitutional doctrines. Students develop the ability to critique textual materials, think analytically about empirical data on judicial behavior, and build cogent arguments about the issues covered."
