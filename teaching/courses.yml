      url: "syllabi/POLI391-World-Constitutions-Syllabus-fa26.pdf"
      icon: "fa-solid fa-file-pdf"
  date: 2026-08-01

- code: "GOV 357L"
  title: "Judicial Process and Behavior"
  institution: "University of Texas at Austin"
  semesters:
    - "Spring 2024"
  summary: "An examination of the operation of the U.S. civil and criminal justice system, judicial decision-making through both normative and empirical approaches, and relevant constitutional doctrines. Students develop the ability to critique textual materials, think analytically about empirical data on judicial behavior, and build cogent arguments about the issues covered."
  actions:
    - name: "Syllabus"
      url: "syllabi/GOV357L_syllabus_sp24.pdf"
      icon: "fa-solid fa-file-pdf"
  date: 2024-01-01

